  // hosts that never send a theme. Once any user or host theme arrives, we
  // stop tracking the OS so the chosen theme stays authoritative.
  if (themeMql && themeMql.addEventListener) {
    themeMql.addEventListener("change", function (ev) {
      if (!hostThemeReceived && !userThemeOverride) {
        applyTheme(ev.matches ? "dark" : "light");
      }
    });
  }

  function initMcp() {
    if (window.parent === window) { return; }  // not embedded: leave waiting screen
    var bridge = createBridge();
    var started = false, toolArgs = null, hostInitialized = false;

    function maybeStart() {
      if (started || toolArgs === null || !hostInitialized) { return; }
      if (typeof toolArgs.memo_text !== "string" || !toolArgs.cites ||
          !toolArgs.cites.citations) {
        showMcpStatus("The review tool was called without memo_text/cites — " +
                      "re-run /cite-check.");
        return;
      }
      started = true;
      startApp(makeMcpSource(bridge, toolArgs));
      // Tester finding: the model retypes the memo into the tool args, and
      // transcription drift is possible. Verify the delivered memo_text
      // against the hash recorded at verification time.
      checkMemoIntegrity(toolArgs.memo_text,
                         toolArgs.cites.memo && toolArgs.cites.memo.sha256);
    }

    bridge.on("ui/notifications/tool-input", function (params) {
      toolArgs = (params && params.arguments) || {};
      maybeStart();
    });
    bridge.on("ui/notifications/tool-result", function () { /* count summary only */ });
    bridge.on("ui/notifications/tool-cancelled", function () {
      showMcpStatus("The tool call was cancelled.");
    });
    bridge.on("ui/notifications/host-context-changed", function (params) {
      // McpUiHostContextChangedNotification: a partial McpUiHostContext;
      // theme may be in this update (toggle) or not (other field changed).
      applyHostContext(params || {});
    });
    bridge.onRequest("ui/resource-teardown", function () { return {}; });

    bridge.request("ui/initialize", {
      protocolVersion: "2026-01-26",
      capabilities: {},
      clientInfo: { name: "dingduff-citecheck-review", version: "1.0.0" }
    }).then(function (result) {
      // Initial hostContext (incl. theme) ships in the ui/initialize result;
      // apply it before declaring init done so the panel paints in the right
      // theme on first render rather than flipping a tick later.
      if (result && result.hostContext) { applyHostContext(result.hostContext); }
      hostInitialized = true;
      bridge.notify("ui/notifications/initialized", {});
      maybeStart();
    }, function (err) {
      showMcpStatus("Host bridge initialize failed: " + err.message);
    });
  }

  function makeMcpSource(bridge, args) {
    var cites = args.cites;
    var memoText = args.memo_text;
    var documents = args.documents || {};  // inline 'document' source texts
    var misses = { count: 0 };
    var binds = {};
    cites.citations.forEach(function (c) {
      if (c.binds_to) { binds[c.id] = c.binds_to; }
    });
    // Re-anchor every quote for `key` into docText (the JS normalizer is
    // locked to the Python verifier), then segment for highlighting. Shared by
    // the fetched-source path and the inline-document path.
    function buildSourceDoc(key, docText, reanchored) {
      var normDoc = normalizeWithMap(docText);
      var spans = [], unlocated = [];
      cites.citations.forEach(function (c) {
        if (c.source !== key) { return; }
        (c.anchors || []).forEach(function (a, i) {
          var span = findQuoteSpan(docText, normDoc, a.quote);
          if (span) {
            spans.push({ start: span.start, end: span.end, mark: c.id + ":" + i });
          } else {
            misses.count += 1;
            unlocated.push({ cid: c.id, quote: a.quote });
          }
        });
      });
      // `reanchored` drives the "re-located in a freshly fetched copy" notice —
      // true for hosted opinions/statutes (the panel fetches a fresh copy that
      // may differ from the verified file), false for inline documents (the
      // delivered text IS the verified working file, so no caveat is needed).
      return { segments: splitSegmentsAtPageMarkers(
                 segmentDocument(docText, spans)),
               checksum_ok: true, reanchored: !!reanchored, unlocated: unlocated };
    }

    // Find inline page markers — the literal token `<<pg. NNN>>` that
    // opinion_store inserts into stored opinion text at each page boundary
    // (replacing CL's invisible U+200B markers, which were unspottable). Split
    // each segment around any markers it contains, dropping the marker text
    // and inserting a pageBreak pseudo-segment that the render loop turns
    // into a visible pill. The page number rides on the marker itself, so no
    // per-source citation parsing is needed here — and parallel-reporter
    // ambiguity is resolved once on the server, not re-derived per render.
    var PAGE_MARKER_RE = /<<pg\. (\d+)>>/g;
    function splitSegmentsAtPageMarkers(segments) {
      var out = [];
      segments.forEach(function (seg) {
        if (seg.pageBreak) { out.push(seg); return; }
        if (typeof seg.text !== "string" || seg.text.indexOf("<<pg.") === -1) {
          out.push(seg);
          return;
        }
        PAGE_MARKER_RE.lastIndex = 0;
        var text = seg.text;
        var cursor = 0;
        var m;
        while ((m = PAGE_MARKER_RE.exec(text)) !== null) {
          if (m.index > cursor) {
            out.push({ text: text.slice(cursor, m.index), marks: seg.marks });
          }
          out.push({ pageBreak: true, page: parseInt(m[1], 10) });
          cursor = m.index + m[0].length;
        }
        if (cursor < text.length) {
          out.push({ text: text.slice(cursor), marks: seg.marks });
        }
      });
      return out;
    }
    return {
      mode: "mcp",
      cites: cites,
      memoDoc: {
        segments: segmentDocument(memoText, findMemoSpans(memoText, cites.citations)),
        checksum_ok: true
      },
      binds: binds,
      build: { forced: false, mismatches: [] },
      priorReview: null,
      reanchorMisses: misses,
      getSourceDoc: function (key) {
        var meta = cites.sources[key] || {};
        if (meta.missing) { return Promise.resolve({ segments: null, missing: true }); }
        // Working-file ('document') sources ride inline in args.documents —
        // they are attorney work product and are never fetched from the server.
        // Key off the authoritative source type (required in cites.sources), not
        // the mere presence of a documents entry, so an inline payload can never
        // shadow a hosted opinion/statute fetch.
        if (meta.type === "document") {
          var inline = documents[key];
          if (!inline || typeof inline.text !== "string") {
            return Promise.resolve({ segments: null, missing: true, missingInline: true });
          }
          // Integrity: the inline text must match the file the verifier hashed
          // (cites.sources[key].sha256). On mismatch, show the text but suppress
          // highlights — the same posture as the standalone bundle and the memo
          // check. Skips silently when crypto.subtle can't compute a hash.
          return sha256Hex(inline.text).then(function (hex) {
            if (hex !== null && meta.sha256 && hex !== meta.sha256) {
              return { segments: [{ text: inline.text, marks: [] }], checksum_ok: false };
            }
            return buildSourceDoc(key, inline.text, false);
          });
        }
        var sourceId = meta.type === "opinion"
          ? (meta.cluster_id != null ? String(meta.cluster_id) : null)
          : (meta.statute_id || null);
        if (!sourceId) { return Promise.resolve({ segments: null, missing: true }); }
        return bridge.request("tools/call", {
          name: "citecheck_fetch_source",
          arguments: { source_type: meta.type, source_id: sourceId }
        }).then(function (result) {
          var sc = result && result.structuredContent;
          if (!sc || typeof sc.document_markdown !== "string") {
            throw new Error((sc && sc.error) || "source fetch returned no document");
          }
          return buildSourceDoc(key, sc.document_markdown, true);
        });
      },
      sendReview: function (reviewJson, summary) {
        bridge.request("ui/update-model-context", {
          structuredContent: { citecheck_review_summary: summary }
        }).catch(function () { /* optional */ });
        // Reviewer notes are free-form and can contain backticks, which would
        // prematurely close a ```-fence. Per CommonMark, a fence is only
        // closed by a run of at least as many backticks, so size the fence
        // one longer than the longest run in the payload — keeping the note
        // verbatim and the block unambiguous.
        var longest = 0;
        var runs = reviewJson.match(/`+/g);
        if (runs) { runs.forEach(function (r) { longest = Math.max(longest, r.length); }); }
        var fence = new Array(Math.max(3, longest + 1) + 1).join("`");
        var text = "The attorney completed the cite-check review. " + summary +
          "\n\nPlease save the following as review.json in the project folder " +
          "(next to cites.json):\n\n" + fence + "json\n" + reviewJson + "\n" + fence;
        return bridge.request("ui/message", {
          role: "user",
          content: { type: "text", text: text }
        });
      }
    };
  }

  // Exposed for the dev harness's normalization parity self-test only.
  window.CiteCheckTest = {
    normalizeWithMap: normalizeWithMap,
    normalizeNeedle: normalizeNeedle,
    segmentDocument: segmentDocument,
    findQuoteSpan: findQuoteSpan,
    findMemoSpans: findMemoSpans
  };

  boot();
})();
</script>
</body>
</html>
