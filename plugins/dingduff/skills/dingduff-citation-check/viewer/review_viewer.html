<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Opts the page into both color schemes so browsers theme native form
     controls (scrollbars, date pickers, focus rings) for the matching mode. -->
<meta name="color-scheme" content="light dark">
<script>
  // Apply the OS theme to <html data-theme="..."> BEFORE first paint to avoid
  // a flash of the wrong mode. The MCP App host (if present) overrides this
  // later via hostContext on ui/initialize / ui/notifications/host-context-
  // changed; that's the load-bearing path inside Claude — `prefers-color-
  // scheme` on an iframe reads the OS, not Claude's in-app theme.
  (function () {
    try {
      var dark = window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute(
        "data-theme", dark ? "dark" : "light");
    } catch (e) { /* leave the attribute unset; CSS default (light) applies */ }
  })();
</script>
<title>DingDuff Cite-Check Review</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f6f3;
    --pane: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #e2ded6;
    --accent: #1f4e8c;
    --green: #1e7d3e;
    --green-bg: #cde9d4;
    --red: #b3261e;
    --red-bg: #f8ccc6;
    --amber: #9a6700;
    --amber-bg: #ffe39a;
    --gray-bg: #f0efec;
    --card-bg: #eaf2fc;
    --hl: #fff3b0;
    --hl-current: #ffd66e;
    /* Tokens for previously-hardcoded contextual colors, kept here so the
       dark-mode override below has a single place to retune them. */
    --reviewer-needed-bg: #fdecea;
    --reviewer-needed-fg: #c0392b;
    --cite-current-bg: #e7eefb;
    --input-bg: #ffffff;
    --search-hl-bg: #bfe1ff;
    --search-hl-current-bg: #4ea2f7;
    --search-hl-current-fg: #ffffff;
    --page-hint-bg: #d0eee0;
    --page-hint-fg: #14423b;
    /* Text color used ON saturated status fills (primary button, verdict
       buttons, reflow toggle). Light fills in dark mode flip this dark. */
    --on-status-fg: #ffffff;
    font-size: 15px;
  }

  /* Dark mode keys off [data-theme="dark"] on <html> — set by the inline
     bootstrap in <head> from prefers-color-scheme, then overridden by the
     MCP App host's hostContext.theme when this panel is embedded in Claude.
     prefers-color-scheme on an iframe reads the OS, not Claude's in-app
     theme, so we cannot rely on a @media (prefers-color-scheme: dark) query
     here — it would miss the host-theme case that motivates this whole
     block. Same token names, retuned for legibility on a dark canvas:
     status colors stay semantically obvious (green = verified, red =
     rejected, amber = needs attention), highlights become deep tints so
     the document's light ink reads on top, and the DingDuff blue is
     lifted for contrast. */
  :root[data-theme="dark"] {
    --bg: #141414;
    --pane: #1e1e1e;
    --ink: #ececec;
    --muted: #a8a8a8;
    --line: #2a2a2a;
    --accent: #8fb7e6;
    --green: #7dc990;
    --green-bg: #1f3328;
    --red: #e68a82;
    --red-bg: #321b18;
    --amber: #d9b96a;
    --amber-bg: #2f2517;
    --gray-bg: #101010;
    --card-bg: #252a36;
    --hl: #6e5a1f;
    --hl-current: #a6822a;
    --reviewer-needed-bg: #3a1c19;
    --reviewer-needed-fg: #e68a82;
    --cite-current-bg: #26344e;
    --input-bg: #222222;
    --search-hl-bg: #274560;
    --search-hl-current-bg: #3a7dc9;
    --search-hl-current-fg: #ffffff;
    --page-hint-bg: #1f3a30;
    --page-hint-fg: #c8e6d8;
    /* Status fills are LIGHTER in dark mode, so flip the on-fill text dark
       (white-on-pale-green is unreadable; near-black on pale green pops). */
    --on-status-fg: #0e0e0e;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header#topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--pane);
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .brand { font-weight: 700; color: var(--accent); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  #brand-icon { width: 20px; height: 20px; flex: 0 0 auto; }
  .ddog { display: inline-block; }
  .ddog svg { width: 100%; height: 100%; display: block; }
  .brand span { font-weight: 400; color: var(--muted); }
  #memo-name {
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
    font-size: 0.92em;
  }
  .chip {
    background: var(--gray-bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 12px;
    font-size: 0.85em;
    white-space: nowrap;
  }
  #reviewer {
    width: 150px;
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 0.9em;
  }
  #reviewer { background: var(--input-bg); color: var(--ink); }
  #reviewer.needed { border-color: var(--reviewer-needed-fg); background: var(--reviewer-needed-bg); }
  #reviewer.needed::placeholder { color: var(--reviewer-needed-fg); }
  @keyframes reviewer-nudge {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  #reviewer.nudge-anim { animation: reviewer-nudge 0.22s ease; }
  button {
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--pane);
    cursor: pointer;
    font-size: 0.9em;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: var(--on-status-fg); }
  #banner {
    background: var(--red-bg);
    color: var(--red);
    border-bottom: 1px solid var(--red);
    padding: 8px 16px;
    font-size: 0.92em;
  }
  #chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 8px 16px;
    background: var(--pane);
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .cite-chip {
    font-size: 0.8em;
    padding: 2px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--gray-bg);
    cursor: pointer;
    user-select: none;
  }
  .cite-chip.failed { border-color: var(--red); color: var(--red); }
  .cite-chip.noquote { color: var(--muted); border-style: dotted; }
  .cite-chip.current { outline: 2px solid var(--accent); }
  .cite-chip.v-verified { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .cite-chip.v-rejected { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .cite-chip.v-needs_attention { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
  main {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    grid-template-rows: minmax(0, 1fr);
    gap: 0;
    min-height: 0;
  }
  section { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  #memo-pane { border-right: 1px solid var(--line); }
  .pane-head {
    padding: 6px 16px;
    font-size: 0.8em;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: var(--pane);
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pane-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 auto;
  }
  #reflow-toggle {
    flex: 0 0 auto;
    padding: 2px 9px;
    font-size: 0.95em;
    text-transform: none;
    letter-spacing: 0;
    border-radius: 999px;
  }
  #reflow-toggle.on { background: var(--accent); border-color: var(--accent); color: var(--on-status-fg); }
  /* Small icon-only theme toggle. Sits in the topbar; user click is the
     highest-priority theme signal (sticks for the session even if the MCP
     host later sends a different theme). */
  #theme-toggle {
    flex: 0 0 auto;
    padding: 4px 7px;
    line-height: 0;
    color: var(--muted);
  }
  #theme-toggle:hover { color: var(--ink); }
  #theme-toggle svg { display: block; width: 16px; height: 16px; }
  .doc {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding: 20px 24px 60vh;
    background: var(--pane);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.02em;
    line-height: 1.65;
    white-space: pre-wrap;
    overflow-wrap: break-word;
  }
  .doc .notice {
    font-family: inherit;
    background: var(--gray-bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--muted);
    white-space: normal;
    margin-bottom: 14px;
  }
  .doc .notice.warn { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  a.cite {
    color: var(--accent);
    text-decoration: underline;
    text-decoration-thickness: 1.5px;
    text-underline-offset: 2px;
    cursor: pointer;
  }
  a.cite.failed { color: var(--red); text-decoration-style: dashed; }
  a.cite.noquote { color: var(--muted); text-decoration-style: dotted; }
  a.cite.current { background: var(--cite-current-bg); outline: 1px solid var(--accent); border-radius: 2px; }
  a.cite.v-verified { background: var(--green-bg); }
  a.cite.v-rejected { background: var(--red-bg); }
  a.cite.v-needs_attention { background: var(--amber-bg); }
  mark { background: var(--hl); padding: 0; border-radius: 2px; }
  mark.current { background: var(--hl-current); outline: 1px solid var(--amber); }
  #card {
    flex: 0 0 auto;
    background: var(--card-bg);
    border-bottom: 1px solid var(--line);
    padding: 12px 16px;
    max-height: 45%;
    overflow-y: auto;
  }
  #card .row1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #card .cid { font-weight: 700; color: var(--accent); }
  .badge {
    font-size: 0.75em;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge.anchored { background: var(--green-bg); color: var(--green); }
  .badge.anchor_failed { background: var(--red-bg); color: var(--red); }
  .badge.no_quote_claimed { background: var(--gray-bg); color: var(--muted); }
  .badge.match { background: var(--gray-bg); color: var(--muted); text-transform: none; }
  #card .cite-text { font-family: Georgia, serif; margin: 8px 0 2px; }
  #card .prop { color: var(--ink); margin: 6px 0; }
  #card .prop b { color: var(--muted); font-weight: 600; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.04em; }
  #card .meta { color: var(--muted); font-size: 0.85em; }
  #src-search-row { display: flex; align-items: center; gap: 6px; margin: 8px 0 2px; }
  #src-search { flex: 1 1 auto; min-width: 0; padding: 4px 8px; border: 1px solid var(--line);
                border-radius: 6px; font-size: 0.88em; background: var(--input-bg); color: var(--ink); }
  #src-search-count { color: var(--muted); font-size: 0.8em; white-space: nowrap;
                      min-width: 34px; text-align: right; }
  #src-search-row button { padding: 1px 8px; font-size: 1.05em; line-height: 1.3; }
  #src-search-row button:disabled { opacity: 0.4; cursor: default; }
  /* find-in-source matches (CSS Custom Highlight API) — distinct blue, so they
     never get confused with the yellow anchor highlights. */
  ::highlight(cc-search) { background-color: var(--search-hl-bg); }
  ::highlight(cc-search-current) { background-color: var(--search-hl-current-bg); color: var(--search-hl-current-fg); }
  /* Page-word hints — any source document (an attorney-supplied brief, a
     Restatement section, a non-CourtListener case) often has explicit "page"
     or "pg" references inline. Highlighting them helps pin-cite verification
     in sources that don't have our own page pills. Distinct hue from search
     (blue) and anchors (yellow) — soft teal. */
  ::highlight(cc-page-hint) {
    background-color: var(--page-hint-bg);
    color: var(--page-hint-fg);
  }
  /* Page-break indicators — opinion_store inserts inline `<<pg. N>>` markers
     at each page boundary; the viewer drops the marker text and renders this
     pill in its place so attorneys can spot which page a passage lives on
     when checking pin-cites. The page number is supplied by CSS `content`
     from data-page, so the DOM text content stays unchanged at the marker
     position — anchor offsets and find-in-source matching are unaffected. */
  .cc-pagebreak {
    display: inline-block;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.72em;
    font-weight: 500;
    color: var(--muted);
    background: var(--gray-bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0 7px;
    margin: 0 4px;
    vertical-align: 1px;
    user-select: none;
    white-space: nowrap;
  }
  .cc-pagebreak::before { content: "p. " attr(data-page); }
  #card .fail-note, #card .stale-note {
    background: var(--red-bg); color: var(--red);
    border-radius: 6px; padding: 8px 10px; margin: 8px 0; font-size: 0.9em;
  }
  #card .stale-note { background: var(--amber-bg); color: var(--amber); }
  #verdicts { display: flex; gap: 8px; margin: 10px 0 6px; flex-wrap: wrap; align-items: center; }
  #verdicts button { font-size: 0.88em; }
  #verdicts button.on-verified { background: var(--green); border-color: var(--green); color: var(--on-status-fg); }
  #verdicts button.on-rejected { background: var(--red); border-color: var(--red); color: var(--on-status-fg); }
  #verdicts button.on-needs_attention { background: var(--amber); border-color: var(--amber); color: var(--on-status-fg); }
  #nav-btns { margin-left: auto; display: flex; gap: 6px; }
  #note {
    width: 100%;
    min-height: 38px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 0.9em;
    resize: vertical;
    background: var(--input-bg);
    color: var(--ink);
  }
  #footer {
    flex: 0 0 auto;
    padding: 4px 16px;
    font-size: 0.78em;
    color: var(--muted);
    background: var(--pane);
    border-top: 1px solid var(--line);
    display: flex;
    gap: 16px;
  }
  #mcp-waiting {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-align: center;
    padding: 40px;
  }
  kbd {
    background: var(--gray-bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0 5px;
    font-size: 0.85em;
  }
  /* Printable audit log (standalone mode): when body.print-audit is set,
     printing shows ONLY the generated audit table, letter landscape.
     Table styles mirror scripts/build_audit.py — keep them in lockstep. */
  #print-audit { display: none; }
  @media print {
    @page { size: letter landscape; margin: 0.5in; }
    body.print-audit > :not(#print-audit) { display: none !important; }
    body.print-audit #print-audit { display: block !important; }
  }
  #print-audit { font-size: 9.5pt; color: #1a1a1a; }
  #print-audit h1 { font-size: 13pt; margin: 0 0 2pt; }
  #print-audit .meta, #print-audit .legend { color: #555; font-size: 8.5pt; margin-bottom: 6pt; }
  #print-audit table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  #print-audit thead { display: table-header-group; }
  #print-audit th { background: #f0efec; text-align: left; font-size: 8.5pt;
                    text-transform: uppercase; letter-spacing: 0.04em; }
  #print-audit th, #print-audit td { border: 0.5pt solid #999; padding: 3pt 5pt;
                    vertical-align: top; overflow-wrap: break-word; }
  #print-audit tr { page-break-inside: avoid; }
  #print-audit td.status { text-align: center; font-size: 12pt; }
  #print-audit .integrity { margin-top: 10pt; font-size: 7.5pt; color: #555;
                    border-top: 0.5pt solid #999; padding-top: 4pt; }
</style>
</head>
<body>
<header id="topbar" hidden>
  <div class="brand"><span id="brand-icon" class="ddog" aria-hidden="true"></span>DingDuff <span>Cite-Check</span></div>
  <div id="memo-name"></div>
  <div id="progress" class="chip"></div>
  <button id="theme-toggle" type="button" title="Switch to dark mode" aria-label="Switch to dark mode"></button>
  <input id="reviewer" placeholder="Your initials *" autocomplete="off"
         title="Your initials are required before you can record a verdict.">
  <button id="audit-btn" title="Open the print dialog to save this review as a PDF; if printing is blocked, downloads a print-ready HTML copy">Generate Printable Review Audit Log</button>
  <button id="export-btn" class="primary">Export review.json</button>
</header>
<div id="banner" hidden></div>
<div id="chips" hidden></div>
<main hidden id="main">
  <section id="memo-pane">
    <div class="pane-head" id="memo-head"><span class="pane-label" id="memo-label">Memo</span></div>
    <div id="memo-body" class="doc"></div>
  </section>
  <section id="right-pane">
    <div id="card" hidden>
      <div class="row1">
        <span class="cid" id="card-cid"></span>
        <span class="badge" id="card-status"></span>
        <span class="badge match" id="card-match" hidden></span>
        <span class="meta" id="card-meta"></span>
        <span id="nav-btns">
          <button id="prev-btn" title="Previous citation (←)">← prev</button>
          <button id="next-btn" title="Next citation (→)">→ next</button>
        </span>
      </div>
      <div class="cite-text" id="card-cite"></div>
      <div class="prop"><b>Offered for:</b> <span id="card-prop"></span></div>
      <div id="src-search-row">
        <input id="src-search" type="search" placeholder="Find in source…"
               autocomplete="off" spellcheck="false" aria-label="Find in source"
               title="Search the source document shown below (Enter / Shift+Enter to step through matches)">
        <span id="src-search-count"></span>
        <button id="src-search-prev" type="button" title="Previous match (Shift+Enter)" aria-label="Previous match">‹</button>
        <button id="src-search-next" type="button" title="Next match (Enter)" aria-label="Next match">›</button>
      </div>
      <div class="fail-note" id="card-fail" hidden></div>
      <div class="stale-note" id="card-stale" hidden></div>
      <div id="verdicts">
        <button data-verdict="verified" title="Shortcut: 1">✅ Verified</button>
        <button data-verdict="needs_attention" title="Shortcut: 2">⚠️ Needs attention</button>
        <button data-verdict="rejected" title="Shortcut: 3">‼️ Rejected</button>
      </div>
      <textarea id="note" placeholder="Reviewer note (optional)"></textarea>
    </div>
    <div class="pane-head" id="source-head">
      <span class="pane-label" id="source-label">Source</span>
      <button id="reflow-toggle" title="Collapse hard-wrapped line breaks in the source text for easier reading. Highlights and exact wording are unchanged; toggle off to see the file's original line breaks.">↵ Reflow</button>
    </div>
    <div id="source-body" class="doc"></div>
  </section>
</main>
<div id="footer" hidden>
  <span>Keyboard: <kbd>←</kbd>/<kbd>→</kbd> prev/next · <kbd>1</kbd>–<kbd>3</kbd> verdicts</span>
  <span id="anchor-counter"></span>
  <span id="mode-label"></span>
</div>
<div id="mcp-waiting" hidden>
  <div>
    <p><strong>DingDuff Cite-Check Review</strong></p>
    <p>Waiting for the Claude host to deliver review data…</p>
    <p>This panel runs inside Claude as an MCP App, or as a standalone bundle
       generated by <code>build_review.py</code>.</p>
  </div>
</div>

<div id="print-audit" hidden></div>

<script id="citecheck-payload" type="application/json">/*__CITECHECK_PAYLOAD__*/</script>
<script>
(function () {
  "use strict";

  var $ = function (id) { return document.getElementById(id); };

  // DingDuff brand mark (George) as inline SVG. MUST be CSP-safe: MCP App
  // iframes block data: image URIs in img-src, so a data: <img> never
  // renders — inline SVG (DOM) does. Keep in lockstep with build_audit.py.

"/><rect x="24" y="20" width="1" height="1" fill="#7c4e24"/><rect x="24" y="22" width="1" height="1" fill="#7c4e24"/><rect x="24" y="21" width="1" height="1" fill="#895729"/><rect x="25" y="13" width="1" height="1" fill="#513219"/><rect x="25" y="22" width="1" height="1" fill="#7a5534"/><rect x="25" y="14" width="1" height="1" fill="#7c4e24"/><rect x="25" y="16" width="1" height="3" fill="#7c4e24"/><rect x="25" y="21" width="1" height="1" fill="#7c4e24"/><rect x="25" y="20" width="1" height="1" fill="#895729"/><rect x="25" y="15" width="2" height="1" fill="#7c4e24"/><rect x="25" y="19" width="2" height="1" fill="#7c4e24"/><rect x="26" y="14" width="1" height="1" fill="#513219"/><rect x="26" y="20" width="1" height="1" fill="#513219"/><rect x="26" y="13" width="1" height="1" fill="#7a5534"/><rect x="26" y="21" width="1" height="1" fill="#7a5534"/><rect x="26" y="16" width="1" height="3" fill="#895729"/><rect x="27" y="15" width="1" height="4" fill="#513219"/><rect x="27" y="14" width="1" height="1" fill="#7a5534"/><rect x="27" y="19" width="1" height="1" fill="#7a5534"/></svg>';

  // ------------------------------------------------------------------
  // Boot: decide payload source (standalone bundle vs MCP host bridge)
  // ------------------------------------------------------------------
  function boot() {
    var payload = null;
    try { payload = JSON.parse($("citecheck-payload").textContent); } catch (e) {}
    if (payload && payload.mode === "standalone") {
      startApp(makeStandaloneSource(payload));
    } else {
      // MCP App mode: no embedded payload — data arrives over the host
      // bridge (ui/initialize handshake, then ui/notifications/tool-input).
      $("mcp-waiting").hidden = false;
      initMcp();
    }
  }

  function makeStandaloneSource(p) {
    return {
      mode: "standalone",
      cites: p.cites,
      memoDoc: p.memo_doc,
      binds: p.binds || {},
      build: p.build || { forced: false, mismatches: [] },
      priorReview: p.prior_review || null,
      getSourceDoc: function (key) {
        return Promise.resolve(p.source_docs[key] ||
          { segments: null, checksum_ok: null, missing: true });
      },
      sendReview: null  // standalone: download/clipboard only
    };
  }

  // ------------------------------------------------------------------
  // Application
  // ------------------------------------------------------------------
  var src = null;           // payload source
  var citations = [];       // ordered citation entries
  var byId = {};            // cid -> citation
  var verdicts = {};        // cid -> {verdict, note, reviewer, at, binds_to}
  var notes = {};           // cid -> note typed independently of any verdict
  var staleReviews = {};    // cid -> imported-but-stale entry
  var current = null;       // selected cid
  var memoLinks = {};       // cid -> [<a>]
  var chipEls = {};         // cid -> chip element
  var sourceCache = {};     // source key -> rendered container
  var anchorEls = {};       // "cid:i" -> [<mark>] (current source only)
  var storageKey = null;
  var search = { query: "", ranges: [], idx: -1 };  // find-in-source state

  function startApp(payloadSource) {
    src = payloadSource;
    citations = src.cites.citations;
    citations.forEach(function (c) { byId[c.id] = c; });
    storageKey = "citecheck:" + src.cites.memo.sha256;

    $("mcp-waiting").hidden = true;
    $("brand-icon").innerHTML = DOG_SVG;
    $("topbar").hidden = false;
    $("chips").hidden = false;
    $("main").hidden = false;
    $("footer").hidden = false;
    $("mode-label").textContent = "mode: " + src.mode;
    if (src.sendReview) {
      $("export-btn").textContent = "Send review to Claude";
      // In MCP mode the audit log is generated by the skill (build_audit.py)
      // after review.json lands on disk; printing from the iframe is
      // host-dependent, so the button is standalone-only.
      $("audit-btn").hidden = true;
    }

    loadLocal();
    if (src.priorReview) { applyImportedReview(src.priorReview, false); }

    $("memo-name").textContent = src.cites.memo.path;
    $("memo-label").textContent = "Memo — " + src.cites.memo.path;

    if (src.build.forced && src.build.mismatches.length) {
      var b = $("banner");
      b.hidden = false;
      b.textContent = "⚠ Files changed since verification — highlights are " +
        "suppressed for: " + src.build.mismatches.join(", ") +
        ". Re-run /cite-check for a trustworthy review.";
    }

    renderMemo();
    renderChips();
    updateProgress();
    wireControls();
    if (citations.length) { select(citations[0].id, true); }
  }

  // ---------------- rendering: memo ----------------
  function renderMemo() {
    var body = $("memo-body");
    body.replaceChildren();
    memoLinks = {};
    if (src.memoDoc.checksum_ok === false) {
      var n = document.createElement("div");
      n.className = "notice warn";
      n.textContent = "The memo changed since verification; citation links are disabled.";
      body.appendChild(n);
    }
    src.memoDoc.segments.forEach(function (seg) {
      if (!seg.marks || !seg.marks.length) {
        body.appendChild(document.createTextNode(seg.text));
        return;
      }
      var cid = seg.marks[0];
      var a = document.createElement("a");
      a.className = "cite";
      a.textContent = seg.text;
      a.dataset.cid = cid;
      a.addEventListener("click", function (ev) {
        ev.preventDefault();
        select(cid, false);
      });
      (memoLinks[cid] = memoLinks[cid] || []).push(a);
      body.appendChild(a);
    });
    citations.forEach(function (c) { styleCite(c.id); });
  }

  function renderChips() {
    var bar = $("chips");
    bar.replaceChildren();
    chipEls = {};
    citations.forEach(function (c) {
      var chip = document.createElement("span");
      chip.className = "cite-chip";
      chip.textContent = c.id;
      chip.title = c.cite_text;
      chip.addEventListener("click", function () { select(c.id, true); });
      chipEls[c.id] = chip;
      bar.appendChild(chip);
      styleCite(c.id);
    });
  }

  function styleCite(cid) {
    var c = byId[cid];
    var v = verdicts[cid];
    var statusClass = c.status === "anchor_failed" ? "failed"
                    : c.status === "no_quote_claimed" ? "noquote" : "";
    var classes = ["cite"];
    if (statusClass) classes.push(statusClass);
    if (cid === current) classes.push("current");
    if (v) classes.push("v-" + v.verdict);
    (memoLinks[cid] || []).forEach(function (a) { a.className = classes.join(" "); });
    var chip = chipEls[cid];
    if (chip) {
      var cc = ["cite-chip"];
      if (statusClass) cc.push(statusClass);
      if (cid === current) cc.push("current");
      if (v) cc.push("v-" + v.verdict);
      chip.className = cc.join(" ");
    }
  }

  // ---------------- rendering: source pane ----------------
  // Source text from scraped opinions often arrives hard-wrapped at ~80
  // columns and double-spaced. Reflow collapses single (hard-wrap) line
  // breaks to spaces while preserving blank-line paragraph breaks, so the
  // pane reads like prose. Off → the file's exact line breaks. WORDS are
  // never changed, so highlight spans and verbatim wording are untouched.
  var reflowOn = (function () {
    try { return localStorage.getItem("citecheck:reflow") !== "off"; }
    catch (e) { return true; }
  })();

  function reflowText(t) {
    if (!reflowOn) { return t; }
    return t
      .replace(/[ \t\f\v]+/g, " ")          // collapse horizontal whitespace
      .replace(/\s*\n\s*\n\s*/g, "\u0000")  // 2+ newlines = paragraph break
      .replace(/\s*\n\s*/g, " ")            // lone newline = hard wrap -> space
      .replace(/\u0000/g, "\n\n");          // restore paragraph breaks
  }

  function syncReflowButton() {
    var btn = $("reflow-toggle");
    btn.classList.toggle("on", reflowOn);
    btn.textContent = reflowOn ? "↵ Reflow: on" : "↵ Reflow: off";
  }

  function toggleReflow() {
    reflowOn = !reflowOn;
    try { localStorage.setItem("citecheck:reflow", reflowOn ? "on" : "off"); }
    catch (e) { /* ignore */ }
    syncReflowButton();
    sourceCache = {};                        // cached DOM was reflowed; rebuild
    if (current) { renderSource(byId[current].source, current); }
  }

  function renderSource(key, focusCid) {
    var body = $("source-body");
    var meta = src.cites.sources[key] || {};
    var label = meta.type === "document"
      ? (meta.title || key)
      : (meta.case_name || meta.citation || key);
    $("source-label").textContent = "Source — " + label +
      (meta.path ? " (" + meta.path + ")" : "");
    body.replaceChildren();
    anchorEls = {};

    var done = function (entry) {
      anchorEls = entry.anchors;
      body.appendChild(entry.el);
      emphasizeAnchors(focusCid);
      refreshSourceSearch();   // re-find the query in the now-current source
      highlightPageHints();    // paint "page"/"pg" word occurrences
    };

    if (sourceCache[key]) { done(sourceCache[key]); return; }

    src.getSourceDoc(key).then(function (doc) {
      var container = document.createElement("div");
      var anchors = {};
      if (!doc || doc.missing || !doc.segments) {
        var n = document.createElement("div");
        n.className = "notice warn";
        n.textContent = (doc && doc.missingInline)
          ? "This supplied document's text was not delivered to the panel. " +
            "Re-run the dingduff-citation-check skill so it passes the document " +
            "in the `documents` argument (and ensure the DingDuff server " +
            "companion is deployed)."
          : "No stored copy of this source is available. The cited authority " +
            "could not be verified — obtain the source and re-run /cite-check.";
        container.appendChild(n);
      } else {
        if (doc.checksum_ok === false) {
          var w = document.createElement("div");
          w.className = "notice warn";
          w.textContent = "This file changed since verification — highlights are suppressed.";
          container.appendChild(w);
        }
        if (doc.reanchored) {
          var r = document.createElement("div");
          r.className = "notice";
          r.textContent = "Highlights were re-located in a freshly fetched copy of " +
            "this source. Verification was performed against your stored file.";
          container.appendChild(r);
        }
        (doc.unlocated || []).forEach(function (u) {
          var x = document.createElement("div");
          x.className = "notice warn";
          var head = document.createElement("strong");
          head.textContent = u.cid + ": verified passage not located in " +
            (doc.reanchored ? "this freshly fetched copy" : "this source") + " — ";
          x.appendChild(head);
          var q = document.createElement("em");
          q.textContent = "“" + u.quote + "”";
          x.appendChild(q);
          container.appendChild(x);
        });
        doc.segments.forEach(function (seg) {
          // reflow is display-only and offset-safe: anchor (mark) boundaries
          // sit on non-whitespace quote characters, so a hard-wrap whitespace
          // run never straddles two segments — collapsing within each segment
          // can't move a highlight relative to its words.
          if (seg.pageBreak) {
            var pb = document.createElement("span");
            pb.className = "cc-pagebreak";
            pb.setAttribute("data-page", String(seg.page));
            pb.setAttribute("aria-label", "page " + seg.page);
            container.appendChild(pb);
            return;
          }
          var text = reflowText(seg.text);
          if (!seg.marks || !seg.marks.length) {
            container.appendChild(document.createTextNode(text));
            return;
          }
          var m = document.createElement("mark");
          m.textContent = text;
          m.dataset.marks = seg.marks.join(" ");
          seg.marks.forEach(function (mk) {
            (anchors[mk] = anchors[mk] || []).push(m);
          });
          container.appendChild(m);
        });
      }
      sourceCache[key] = { el: container, anchors: anchors };
      done(sourceCache[key]);
    }, function (err) {
      var container = document.createElement("div");
      var n = document.createElement("div");
      n.className = "notice warn";
      n.textContent = "Could not load this source: " + (err && err.message || err);
      container.appendChild(n);
      done({ el: container, anchors: {} });
    });
  }

  // Scroll an element to the vertical center of its scrollable pane WITHOUT
  // scrollIntoView, which would also scroll overflow:hidden ancestors and
  // shift the whole app inside its iframe/page.
  function scrollToInPane(pane, el) {
    var pr = pane.getBoundingClientRect();
    var er = el.getBoundingClientRect();
    pane.scrollTop += (er.top - pr.top) - pane.clientHeight / 2 + er.height / 2;
  }

  // ---------------- find-in-source (ctrl-F style) ----------------
  // Uses the CSS Custom Highlight API so matches are painted without mutating
  // the DOM (composing cleanly with the anchor <mark>s). Where it's missing,
  // search still counts matches and scrolls to them, just without the tint.
  var HAS_HIGHLIGHT_API = !!(window.CSS && CSS.highlights &&
    typeof Highlight !== "undefined" && typeof Range !== "undefined");

  function clearSourceHighlights() {
    if (HAS_HIGHLIGHT_API) {
      CSS.highlights.delete("cc-search");
      CSS.highlights.delete("cc-search-current");
    }
  }

  function updateSearchCount() {
    var el = $("src-search-count");
    if (!el) { return; }
    var n = search.ranges.length;
    el.textContent = !search.query ? "" : (n ? (search.idx + 1) + "/" + n : "0/0");
    var prev = $("src-search-prev"), next = $("src-search-next");
    if (prev) { prev.disabled = n < 2; }
    if (next) { next.disabled = n < 2; }
  }

  // Flatten #source-body text nodes into one string + a node/offset index, so a
  // query can match across text-node / <mark> boundaries.
  function sourceTextIndex() {
    var body = $("source-body");
    var nodes = [], starts = [], text = "";
    if (body) {
      var walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, null);
      var node;
      while ((node = walker.nextNode())) {
        starts.push(text.length);
        nodes.push(node);
        text += node.nodeValue;
      }
    }
    return { nodes: nodes, starts: starts, text: text };
  }

  function locate(ix, flatPos) {
    var lo = 0, hi = ix.starts.length - 1, ans = 0;
    while (lo <= hi) {
      var mid = (lo + hi) >> 1;
      if (ix.starts[mid] <= flatPos) { ans = mid; lo = mid + 1; } else { hi = mid - 1; }
    }
    return { node: ix.nodes[ans], offset: flatPos - ix.starts[ans] };
  }

  function gotoMatch(i) {
    var n = search.ranges.length;
    if (!n) { updateSearchCount(); return; }
    search.idx = ((i % n) + n) % n;
    if (HAS_HIGHLIGHT_API) {
      var cur = new Highlight();
      cur.add(search.ranges[search.idx]);
      CSS.highlights.set("cc-search-current", cur);
    }
    var pane = $("source-body");
    var rect = search.ranges[search.idx].getBoundingClientRect();
    var pr = pane.getBoundingClientRect();
    pane.scrollTop += (rect.top - pr.top) - pane.clientHeight / 2 + rect.height / 2;
    updateSearchCount();
  }

  function runSourceSearch(query) {
    search.query = query || "";
    clearSourceHighlights();
    search.ranges = []; search.idx = -1;
    if (!search.query) { updateSearchCount(); return; }
    var ix = sourceTextIndex();
    var hay = ix.text.toLowerCase(), needle = search.query.toLowerCase();
    if (!hay || !needle) { updateSearchCount(); return; }
    var from = 0, pos;
    while ((pos = hay.indexOf(needle, from)) !== -1) {
      var s = locate(ix, pos), e = locate(ix, pos + needle.length);
      try {
        var r = document.createRange();
        r.setStart(s.node, s.offset);
        r.setEnd(e.node, e.offset);
        search.ranges.push(r);
      } catch (ex) { /* skip a malformed boundary */ }
      from = pos + needle.length;
      if (search.ranges.length >= 2000) { break; }   // safety cap
    }
    if (HAS_HIGHLIGHT_API && search.ranges.length) {
      var all = new Highlight();
      search.ranges.forEach(function (r) { all.add(r); });
      CSS.highlights.set("cc-search", all);
    }
    if (search.ranges.length) { gotoMatch(0); } else { updateSearchCount(); }
  }

  // The source DOM (and thus ranges) changes per citation — re-find in whatever
  // source is now showing.
  function refreshSourceSearch() {
    if (search.query) { runSourceSearch(search.query); }
    else { clearSourceHighlights(); updateSearchCount(); }
  }

  // Paint every "page" / "pg" word in the source pane via the CSS Custom
  // Highlight API. Useful for attorney-supplied documents (briefs, Restatement
  // sections, factual PDFs) that carry their own inline page references —
  // those don't have our `<<pg. N>>` markers so the page-pill machinery
  // doesn't help, but spotting "page 12" / "pg 12" inline lets the reviewer
  // jump to a pin-cite. Word-boundary match; case-insensitive. No DOM
  // mutation (so anchor offsets and find-in-source are untouched).
  var PAGE_WORD_RE = /\b(page|pg)\b/gi;
  function highlightPageHints() {
    if (!HAS_HIGHLIGHT_API) { return; }
    var body = $("source-body");
    if (!body) { CSS.highlights.delete("cc-page-hint"); return; }
    var ranges = [];
    var walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, null);
    var node;
    while ((node = walker.nextNode())) {
      var text = node.data;
      if (!text || text.length < 2) { continue; }
      PAGE_WORD_RE.lastIndex = 0;
      var m;
      while ((m = PAGE_WORD_RE.exec(text)) !== null) {
        try {
          var r = document.createRange();
          r.setStart(node, m.index);
          r.setEnd(node, m.index + m[0].length);
          ranges.push(r);
        } catch (e) { /* mutated node mid-walk; skip */ }
        if (ranges.length >= 2000) { break; }   // safety cap
      }
      if (ranges.length >= 2000) { break; }
    }
    if (ranges.length) {
      var hl = new Highlight();
      ranges.forEach(function (r) { hl.add(r); });
      CSS.highlights.set("cc-page-hint", hl);
    } else {
      CSS.highlights.delete("cc-page-hint");
    }
  }

  function emphasizeAnchors(cid) {
    anchorEls = anchorEls || {};
    var firstMark = null;
    Object.keys(anchorEls).forEach(function (mk) {
      var isCurrent = mk.indexOf(cid + ":") === 0;
      anchorEls[mk].forEach(function (el) {
        el.className = isCurrent ? "current" : "";
        if (isCurrent && !firstMark) { firstMark = el; }
      });
    });
    if (firstMark) {
      scrollToInPane($("source-body"), firstMark);
    } else {
      $("source-body").scrollTop = 0;
    }
    updateAnchorCounter();
  }

  function updateAnchorCounter() {
    var total = 0, located = 0;
    citations.forEach(function (c) {
      (c.anchors || []).forEach(function (_, i) {
        total += 1;
        if (anchorEls[c.id + ":" + i] && anchorEls[c.id + ":" + i].length) { /* per-source only */ }
      });
    });
    located = Object.keys(anchorEls).length;
    var text = "anchors in view: " + located + " · total verified: " + total;
    if (src.reanchorMisses && src.reanchorMisses.count) {
      text += " · not re-located: " + src.reanchorMisses.count;
    }
    $("anchor-counter").textContent = text;
  }

  // ---------------- citation card ----------------
  var FAIL_EXPLANATIONS = {
    not_found: "The model could not produce a verbatim supporting passage that exists in the source.",
    case_mismatch: "A matching passage exists but with different capitalization — inspect closely.",
    only_in_citing_cases: "The quoted text appears only in the Citing Cases appendix, not the opinion body.",
    ambiguous_in_memo: "The citation could not be uniquely located in the memo.",
    memo_context_not_found: "The citation's surrounding context could not be located in the memo.",
    cite_text_not_in_context: "The citation text was not inside its claimed context.",
    segment_too_short: "An ellipsis-quote segment was too short to verify safely.",
    ellipsis_gap_too_large: "The parts of an ellipsis quote are too far apart in the source.",
    source_missing: "No stored copy of the cited authority was available to verify against."
  };

  function select(cid, scrollMemo) {
    var prev = current;
    current = cid;
    if (prev) styleCite(prev);
    styleCite(cid);

    var c = byId[cid];
    $("card").hidden = false;
    $("card-cid").textContent = cid;
    var st = $("card-status");
    st.textContent = c.status.replace(/_/g, " ");
    st.className = "badge " + c.status;
    var matches = (c.anchors || []).map(function (a) { return a.match; });
    var matchBadge = $("card-match");
    if (matches.length) {
      matchBadge.hidden = false;
      // Both are verified word-for-word quotes; "formatting differs" flags only
      // cosmetic differences (punctuation, spacing, line breaks, quote marks).
      var normalized = matches.indexOf("normalized") !== -1;
      matchBadge.textContent = normalized ? "Verbatim (formatting differs)" : "Verbatim";
      matchBadge.title = normalized
        ? "Same wording as the source, but with cosmetic differences in " +
          "punctuation, spacing, line breaks, or quote marks — not a paraphrase."
        : "This passage appears in the source word-for-word.";
    } else { matchBadge.hidden = true; }
    $("card-meta").textContent =
      (c.pin ? "pin: " + c.pin + " · " : "") + c.support_type;
    $("card-cite").textContent = c.cite_text;
    $("card-prop").textContent = c.proposition;

    var fail = $("card-fail");
    if (c.status === "anchor_failed") {
      fail.hidden = false;
      fail.textContent = "⚠ " + (FAIL_EXPLANATIONS[c.failure_reason] ||
        ("Verification failed: " + (c.failure_reason || "unknown"))) +
        " Review this citation with particular care.";
    } else { fail.hidden = true; }

    var stale = $("card-stale");
    if (staleReviews[cid]) {
      stale.hidden = false;
      stale.textContent = "An imported verdict (" + staleReviews[cid].verdict +
        " by " + staleReviews[cid].reviewer + ") is stale — the citation or its " +
        "proposition changed since that review. Re-review required.";
    } else { stale.hidden = true; }

    var v = verdicts[cid];
    var btns = $("verdicts").querySelectorAll("button[data-verdict]");
    btns.forEach(function (b) {
      b.className = v && v.verdict === b.dataset.verdict ? "on-" + v.verdict : "";
    });
    syncNoteField(cid, false);

    if (scrollMemo && memoLinks[cid] && memoLinks[cid][0]) {
      scrollToInPane($("memo-body"), memoLinks[cid][0]);
    }
    renderSource(c.source, cid);
  }

  // The note field stays hidden until the citation has a verdict (or an
  // existing note); most ✅ citations never need an explanation. On
  // ⚠️/‼️ it reveals AND focuses with a pointed placeholder.
  function syncNoteField(cid, focusIt) {
    var v = verdicts[cid];
    var note = (v && v.note) || notes[cid] || "";
    var el = $("note");
    el.value = note;
    el.hidden = !v && !note;
    var PLACEHOLDERS = {
      needs_attention: "Why does this need attention? (optional)",
      rejected: "Why is this rejected? (optional)"
    };
    el.placeholder = (v && PLACEHOLDERS[v.verdict]) || "Reviewer note (optional)";
    if (focusIt && !el.hidden) { el.focus(); }
  }

  function nudgeReviewer() {
    var el = $("reviewer");
    el.classList.add("needed");
    el.classList.remove("nudge-anim");
    void el.offsetWidth;            // reflow so the shake animation restarts
    el.classList.add("nudge-anim");
    el.focus();
  }

  function setVerdict(cid, verdict) {
    var toggleOff = verdicts[cid] && verdicts[cid].verdict === verdict;
    // A verdict is a human attestation — the reviewer must identify themselves
    // first. (Clearing an existing verdict doesn't record a new one, so it's
    // allowed without initials.)
    if (!toggleOff && !$("reviewer").value.trim()) {
      nudgeReviewer();
      return;
    }
    if (toggleOff) {
      // Toggle off — keep any typed note in the notes map so it isn't lost.
      notes[cid] = verdicts[cid].note || notes[cid] || "";
      delete verdicts[cid];
    } else {
      verdicts[cid] = {
        verdict: verdict,
        note: $("note").value || notes[cid] || "",
        reviewer: $("reviewer").value.trim(),
        at: new Date().toISOString(),
        binds_to: src.binds[cid] || ""
      };
    }
    persistLocal();
    styleCite(cid);
    updateProgress();
    select(cid, false);
    syncNoteField(cid, verdict !== "verified" && !!verdicts[cid]);
  }

  function updateProgress() {
    var done = Object.keys(verdicts).length;
    $("progress").textContent = done + "/" + citations.length + " reviewed";
  }

  // ---------------- persistence: localStorage ----------------
  function persistLocal() {
    try {
      localStorage.setItem(storageKey, JSON.stringify({
        reviewer: $("reviewer").value || "",
        verdicts: verdicts,
        notes: notes
      }));
    } catch (e) { /* storage unavailable (some sandboxes) — exports still work */ }
  }

  function loadLocal() {
    try {
      var saved = JSON.parse(localStorage.getItem(storageKey));
      if (saved) {
        verdicts = saved.verdicts || {};
        notes = saved.notes || {};
        $("reviewer").value = saved.reviewer || "";
      }
    } catch (e) { /* ignore */ }
  }

  // ---------------- import / export ----------------
  function buildReviewJson() {
    var reviews = {};
    Object.keys(verdicts).forEach(function (cid) {
      var v = verdicts[cid];
      reviews[cid] = {
        verdict: v.verdict,
        note: v.note || "",
        reviewer: v.reviewer || $("reviewer").value || "",
        at: v.at,
        binds_to: v.binds_to
      };
    });
    return { schema_version: 1, reviews: reviews };
  }

  function downloadReview(text) {
    var blob = new Blob([text], { type: "application/json" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "review.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
  }

  function copyReview(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    var ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); } finally { ta.remove(); }
    return Promise.resolve();
  }

  function exportReview() {
    var text = JSON.stringify(buildReviewJson(), null, 2);
    var btn = $("export-btn");
    if (src.sendReview) {            // MCP mode: hand to Claude via ui/message
      btn.disabled = true;
      src.sendReview(text, summaryLine()).then(function () {
        btn.disabled = false;
        btn.textContent = "Sent to Claude ✓";
      }, function () {
        // Fall back: try a download, and put it on the clipboard too.
        btn.disabled = false;
        downloadReview(text);
        copyReview(text);
        btn.textContent = "Downloaded/copied (host send failed)";
      });
      return;
    }
    downloadReview(text);
  }

  function summaryLine() {
    var counts = {};
    Object.keys(verdicts).forEach(function (cid) {
      counts[verdicts[cid].verdict] = (counts[verdicts[cid].verdict] || 0) + 1;
    });
    var parts = Object.keys(counts).map(function (k) { return counts[k] + " " + k; });
    return "Cite-check review: " + Object.keys(verdicts).length + "/" +
      citations.length + " citations reviewed (" + (parts.join(", ") || "none") + ").";
  }

  // Pre-round-2 review.json files carried four verdicts; map the retired
  // ones onto the 3-verdict model and preserve the original in the note.
  var LEGACY_VERDICTS = { misquoted: "rejected", wrong_pin: "needs_attention" };
  var VALID_VERDICTS = { verified: 1, needs_attention: 1, rejected: 1 };

  function applyImportedReview(review, overwrite) {
    if (!review || review.schema_version !== 1 || !review.reviews) { return 0; }
    var applied = 0;
    Object.keys(review.reviews).forEach(function (cid) {
      var entry = review.reviews[cid];
      if (!byId[cid]) { return; }
      var verdict = entry.verdict, note = entry.note || "";
      if (LEGACY_VERDICTS[verdict]) {
        note = (note ? note + " " : "") + "[imported as " + verdict + "]";
        verdict = LEGACY_VERDICTS[verdict];
      }
      if (!VALID_VERDICTS[verdict]) { return; }
      if (entry.binds_to && entry.binds_to === src.binds[cid]) {
        if (overwrite || !verdicts[cid]) {
          verdicts[cid] = {
            verdict: verdict, note: note,
            reviewer: entry.reviewer || "", at: entry.at || "",
            binds_to: entry.binds_to
          };
          applied += 1;
        }
      } else {
        staleReviews[cid] = entry;
      }
    });
    return applied;
  }

  // ---------------- printable audit log (standalone mode) ----------------
  // Table shape mirrors scripts/build_audit.py — keep the two in lockstep.
  var VERDICT_EMOJI = { verified: "✅", needs_attention: "⚠️", rejected: "‼️" };

  function anchoredLabel(c) {
    if (c.status === "anchored") {
      var allExact = (c.anchors || []).every(function (a) { return a.match === "exact"; });
      return allExact && c.anchors.length ? "✓ Verbatim" : "✓ Verbatim (formatting differs)";
    }
    if (c.status === "no_quote_claimed") { return "— no quote claimed"; }
    var reason = c.failure_reason || "failed";
    if (reason === "source_missing") { return "— source missing"; }
    return "✗ " + reason.replace(/_/g, " ");
  }

  function sourceLabel(meta) {
    if (!meta) { return "unknown"; }
    if (meta.type === "opinion") {
      var name = meta.case_name || ("cluster " + (meta.cluster_id || "?"));
      return meta.citation ? name + ", " + meta.citation : name;
    }
    if (meta.type === "document") {
      var label = meta.title || "supplied document";
      return meta.kind ? label + " (" + meta.kind + ")" : label;
    }
    if (meta.citation) { return meta.citation; }
    if (meta.code && meta.section) { return meta.code + " § " + meta.section; }
    return meta.statute_id || "unknown statute";
  }

  // Same page CSS as scripts/build_audit.py (_PAGE_CSS) so the downloaded file
  // is the identical artifact attorneys get from the skill.
  var AUDIT_PAGE_CSS =
    '@page { size: letter landscape; margin: 0.5in; }' +
    '* { box-sizing: border-box; }' +
    'body { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;' +
    ' font-size: 9.5pt; color: #1a1a1a; background: #fff; margin: 0; padding: 12px; }' +
    '@media print { body { padding: 0; } }' +
    'h1 { font-size: 13pt; margin: 0 0 2pt; }' +
    'h1 .ddog { display: inline-block; width: 22px; height: 22px; vertical-align: -4px; margin-right: 7px; }' +
    'h1 .ddog svg { width: 100%; height: 100%; display: block; }' +
    '.meta { color: #555; font-size: 8.5pt; margin-bottom: 8pt; }' +
    'table { width: 100%; border-collapse: collapse; table-layout: fixed; }' +
    'thead { display: table-header-group; }' +
    'th { background: #f0efec; text-align: left; font-size: 8.5pt; text-transform: uppercase; letter-spacing: 0.04em; }' +
    'th, td { border: 0.5pt solid #999; padding: 3pt 5pt; vertical-align: top; overflow-wrap: break-word; }' +
    'tr { page-break-inside: avoid; }' +
    'td.status { text-align: center; font-size: 12pt; }' +
    'td.anchored { font-size: 8.5pt; }' +
    '.col-id { width: 4%; } .col-src { width: 17%; } .col-prop { width: 28%; }' +
    '.col-anch { width: 10%; } .col-status { width: 6%; } .col-note { width: 25%; } .col-by { width: 10%; }' +
    '.integrity { margin-top: 10pt; font-size: 7.5pt; color: #555; border-top: 0.5pt solid #999; padding-top: 4pt; }' +
    '.integrity code { font-family: ui-monospace, Menlo, monospace; }' +
    '.legend { font-size: 8pt; color: #555; margin: 4pt 0 8pt; }';

  var AUDIT_TITLE = "DingDuff Citation Verification Audit Log";
  var AUDIT_LEGEND = "✅ verified · ⚠️ needs attention · ‼️ rejected · ❓ not reviewed. " +
    "\"Anchored\" = the quoted passage was mechanically located, verbatim, " +
    "in the stored source file by the cite-check verifier.";

  function escHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Per-citation rows + tallies, shared by the on-page print view and the
  // downloadable HTML so the two never drift.
  function auditModel() {
    var counts = { "✅": 0, "⚠️": 0, "‼️": 0, "❓": 0 };
    var reviewers = [];
    var rows = citations.map(function (c) {
      var v = verdicts[c.id];
      var emoji = v ? (VERDICT_EMOJI[v.verdict] || "❓") : "❓";
      counts[emoji] += 1;
      var reviewer = (v && v.reviewer) || "";
      if (reviewer && reviewers.indexOf(reviewer) === -1) { reviewers.push(reviewer); }
      return {
        id: c.id, source: sourceLabel(src.cites.sources[c.source]),
        proposition: c.proposition || "", anchored: anchoredLabel(c),
        emoji: emoji, note: (v && v.note) || notes[c.id] || "", reviewer: reviewer
      };
    });
    return { rows: rows, counts: counts, reviewers: reviewers,
             reviewed: citations.length - counts["❓"] };
  }

  function auditMetaLine(m) {
    return "Memo: " + src.cites.memo.path + " · " + m.reviewed + "/" +
      citations.length + " citations attorney-reviewed · ✅ " + m.counts["✅"] +
      " · ⚠️ " + m.counts["⚠️"] + " · ‼️ " + m.counts["‼️"] + " · ❓ " + m.counts["❓"];
  }

  function auditIntegrityLine(m, suffix) {
    return "Integrity record — memo SHA-256: " + src.cites.memo.sha256 +
      " · verification run: " + (src.cites.memo.generated_at || "?") +
      " by " + (src.cites.memo.generated_by || "?") +
      " · reviewers: " + (m.reviewers.join(", ") || "(none)") + " · " + suffix +
      " Verdicts bind to each citation's text+proposition hash; a changed " +
      "citation invalidates its prior verdict.";
  }

  // Render the audit table into #print-audit for the current-page print path.
  function renderPrintAudit(m) {
    var box = $("print-audit");
    box.replaceChildren();
    box.hidden = false;
    function el(tag, cls, text) {
      var node = document.createElement(tag);
      if (cls) { node.className = cls; }
      if (text !== undefined) { node.textContent = text; }
      return node;
    }
    var table = el("table");
    var thead = el("thead"), hr = el("tr");
    ["#", "Source cited", "Proposition cited for", "Anchored?",
     "Review", "Review note", "Reviewed by"].forEach(function (h, i) {
      var th = el("th", null, h);
      th.style.width = ["4%", "17%", "28%", "10%", "6%", "25%", "10%"][i];
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    table.appendChild(thead);
    var tbody = el("tbody");
    m.rows.forEach(function (r) {
      var tr = el("tr");
      tr.appendChild(el("td", null, r.id));
      tr.appendChild(el("td", null, r.source));
      tr.appendChild(el("td", null, r.proposition));
      tr.appendChild(el("td", null, r.anchored));
      tr.appendChild(el("td", "status", r.emoji));
      tr.appendChild(el("td", null, r.note));
      tr.appendChild(el("td", null, r.reviewer));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    var h1 = el("h1");
    var icon = document.createElement("span");
    icon.className = "ddog";
    icon.innerHTML = DOG_SVG;
    icon.style.width = "22px"; icon.style.height = "22px";
    icon.style.verticalAlign = "-4px"; icon.style.marginRight = "7px";
    h1.appendChild(icon);
    h1.appendChild(document.createTextNode(AUDIT_TITLE));
    box.appendChild(h1);
    box.appendChild(el("div", "meta", auditMetaLine(m)));
    box.appendChild(el("div", "legend", AUDIT_LEGEND));
    box.appendChild(table);
    box.appendChild(el("div", "integrity",
      auditIntegrityLine(m, "printed from review_viewer.html.")));
  }

  // A self-contained, print-ready HTML document — the same artifact
  // scripts/build_audit.py produces — used for the download fallback.
  function buildAuditDocument(m) {
    var rows = m.rows.map(function (r) {
      return "<tr><td>" + escHtml(r.id) + "</td><td>" + escHtml(r.source) +
        "</td><td>" + escHtml(r.proposition) + "</td><td class=\"anchored\">" +
        escHtml(r.anchored) + "</td><td class=\"status\">" + escHtml(r.emoji) +
        "</td><td>" + escHtml(r.note) + "</td><td>" + escHtml(r.reviewer) +
        "</td></tr>";
    }).join("\n");
    return [
      "<!DOCTYPE html>",
      "<html lang=\"en\"><head><meta charset=\"utf-8\">",
      "<title>" + escHtml(AUDIT_TITLE) + "</title>",
      "<style>" + AUDIT_PAGE_CSS + "</style></head><body>",
      "<h1><span class=\"ddog\">" + DOG_SVG + "</span>" + escHtml(AUDIT_TITLE) + "</h1>",

  function downloadAuditHtml(m) {

  function flashAuditBtn(msg) {

  // Try the browser print dialog (familiar "Save as PDF" flow); if no print
  // actually starts — the silent-no-op behavior of sandboxed/embedded views,
  // the same contexts where window.print() fails but Blob downloads work —
  // fall back to downloading the audit as a self-contained HTML file.
  function printOrDownloadAudit() {
    var m = auditModel();
    renderPrintAudit(m);

    var printed = false;
    function onBeforePrint() { printed = true; }                 // Chrome/FF/Edge
    var mql = window.matchMedia ? window.matchMedia("print") : null;
    function onMql(e) { if (e && e.matches) { printed = true; } } // Safari
    window.addEventListener("beforeprint", onBeforePrint);
    if (mql && mql.addEventListener) { mql.addEventListener("change", onMql); }

    document.body.classList.add("print-audit");
    var threw = false;
    try { window.print(); } catch (e) { threw = true; }
    document.body.classList.remove("print-audit");

    // In a blocking browser, beforeprint/matchMedia have fired by now; in a
    // no-op context neither has. The timeout also gives non-blocking browsers
    // a moment to fire before we decide.
    setTimeout(function () {
      window.removeEventListener("beforeprint", onBeforePrint);
      if (mql && mql.removeEventListener) { mql.removeEventListener("change", onMql); }
      $("print-audit").hidden = true;
      if (threw || !printed) {
        downloadAuditHtml(m);
        flashAuditBtn("Printing blocked — downloaded HTML");
      }

  function wireControls() {

    if (si) {
      var searchTimer = null;

        // janks large opinions — search shortly after typing pauses.

        searchTimer = setTimeout(function () { runSourceSearch(si.value); }, 130);
      });
      si.addEventListener("keydown", function (ev) {

      });

      $("src-search-prev").addEventListener("click", function () { gotoMatch(search.idx - 1); });
    }

      // verdict must never be silently dropped.

    });

      b.addEventListener("click", function () {

      });

    $("prev-btn").addEventListener("click", function () { step(-1); });
    $("next-btn").addEventListener("click", function () { step(1); });
    document.addEventListener("keydown", function (ev) {
      var t = ev.target;
      var inNote = t && t.id === "note";
      var inField = t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA");

      if (ev.key === "ArrowRight" || ev.key === "ArrowLeft") {
        var dir = ev.key === "ArrowRight" ? 1 : -1;
        // Leave arrows to single-line fields (e.g. the initials / search box).
        if (inField && !inNote) { return; }

        // next/prev citation from there, but only at the very start/end of the
        // note text so they still move the caret while editing.
        if (inNote) {
          if (t.selectionStart !== t.selectionEnd) { return; }
          if (dir === 1 && t.selectionStart !== t.value.length) { return; }
          if (dir === -1 && t.selectionStart !== 0) { return; }

        step(dir);

        // a ⚠️/‼️ verdict is about to focus.

    });
  }

  function step(delta) {
    if (!citations.length) { return; }
    var i = citations.findIndex(function (c) { return c.id === current; });
    var next = citations[(i + delta + citations.length) % citations.length];
    select(next.id, true);

  // ==================================================================
  // MCP App mode: JS normalization port, re-anchoring, host bridge
  // ==================================================================
  //
  // The normalization rules below are a PORT of verify_anchors.py's
  // normalize_with_map and must stay in lockstep with it. The shared test
  // vectors live at skills/dingduff-citation-check/tests/normalization_vectors.json
  // and are exercised by both pytest and the dev harness self-test.
  //
  // Indexing note: these maps are in JS UTF-16 code-unit space and are only
  // ever applied to strings fetched in this same session — Python codepoint
  // offsets from cites.json are never used in MCP mode.

  var CF_RE = /\p{Cf}/u;
  var WS_RE = /\s/;
  var LOWER_RE = /\p{Ll}/u;
  var LETTER_RE = /\p{L}/u;
  var SINGLE_Q = "‘’‚‛′";
  var DOUBLE_Q = "“”„‟″«»";
  var DASHES = "‐‑‒–—―−";

  // HTML character references — LOCKSTEP with verify_anchors.py's
  // HTML_ENTITIES/_decode_entity_at (same fixed table, same numeric forms).
  var HTML_ENTITIES = {
    amp: "&", lt: "<", gt: ">", quot: '"', apos: "'",
    nbsp: " ", shy: "­",
    sect: "§", para: "¶", deg: "°", copy: "©", reg: "®",
    trade: "™", middot: "·", bull: "•",
    mdash: "—", ndash: "–", hellip: "…",
    ldquo: "“", rdquo: "”", lsquo: "‘", rsquo: "’",
    prime: "′", Prime: "″",
    ensp: " ", emsp: " ", thinsp: " ",
    frac12: "½", frac14: "¼", frac34: "¾"
  };
  var ENTITY_RE = /^&(?:#(\d{1,7})|#[xX]([0-9a-fA-F]{1,6})|([a-zA-Z][a-zA-Z0-9]{1,30}));/;

  // Effective character at i: {ch, w} for a decodable reference, else null.
  // hasOwnProperty guards against names like "constructor" hitting the
  // Object prototype.
  function decodeEntityAt(text, i) {
    if (text.charCodeAt(i) !== 38 /* & */) { return null; }
    var m = ENTITY_RE.exec(text.slice(i, i + 34));
    if (!m) { return null; }
    if (m[3] !== undefined) {
      if (Object.prototype.hasOwnProperty.call(HTML_ENTITIES, m[3])) {
        return { ch: HTML_ENTITIES[m[3]], w: m[0].length };
      }
      return null;
    }
    var cp = m[1] !== undefined ? parseInt(m[1], 10) : parseInt(m[2], 16);
    if (cp > 0 && cp <= 0x10FFFF && !(cp >= 0xD800 && cp <= 0xDFFF)) {
      return { ch: String.fromCodePoint(cp), w: m[0].length };
    }
    return null;
  }

  function effectiveCharAt(text, i) {
    var ent = decodeEntityAt(text, i);
    if (ent) { return ent; }
    var ch = String.fromCodePoint(text.codePointAt(i));
    return { ch: ch, w: ch.length };
  }

  function normalizeWithMap(text) {
    var out = [], starts = [], ends = [];
    var i = 0, n = text.length;
    function push(chunk, s, e) {
      for (var q = 0; q < chunk.length; q++) {
        out.push(chunk[q]); starts.push(s); ends.push(e);
      }
    }
    function lastIsSpace() { return out.length && out[out.length - 1] === " "; }
    while (i < n) {
      // Skip `<<pg. N>>` page markers entirely — match the Python verifier's
      // PAGE_MARKER_RE handling so the same quote matches against both the
      // server-side verification copy and the panel-rendered copy.
      if (text.charCodeAt(i) === 60 && text.substr(i, 6) === "<<pg. ") {
        PAGE_MARKER_RE.lastIndex = i;
        var pm = PAGE_MARKER_RE.exec(text);
        if (pm && pm.index === i) { i = pm.index + pm[0].length; continue; }
      }
      var eff = effectiveCharAt(text, i);
      var ch = eff.ch, w = eff.w;
      if (CF_RE.test(ch)) { i += w; continue; }
      if (WS_RE.test(ch)) {
        var s0 = i;
        i += w;
        while (i < n) {
          var e2 = effectiveCharAt(text, i);
          if (WS_RE.test(e2.ch) || CF_RE.test(e2.ch)) { i += e2.w; } else { break; }
        }
        if (!lastIsSpace()) { push(" ", s0, i); }
        continue;
      }
      if (ch === "-" || DASHES.indexOf(ch) !== -1) {
        var j = i + w, sawNl = false;
        while (j < n) {
          var e3 = effectiveCharAt(text, j);
          if (WS_RE.test(e3.ch) || CF_RE.test(e3.ch)) {
            if (e3.ch === "\n" || e3.ch === "\r") { sawNl = true; }
            j += e3.w;
          } else { break; }
        }
        if (sawNl && out.length && LETTER_RE.test(out[out.length - 1]) &&
            j < n && LOWER_RE.test(effectiveCharAt(text, j).ch)) {
          i = j;  // de-hyphenate across the line break
          continue;
        }
        push("-", i, i + w); i += w; continue;
      }
      if (SINGLE_Q.indexOf(ch) !== -1) { push("'", i, i + w); i += w; continue; }
      if (DOUBLE_Q.indexOf(ch) !== -1) { push('"', i, i + w); i += w; continue; }
      if (ch === "…") { push("...", i, i + w); i += w; continue; }
      var folded = ch.normalize("NFKC");
      for (var k = 0; k < folded.length;) {
        var fch = String.fromCodePoint(folded.codePointAt(k));
        k += fch.length;
        if (WS_RE.test(fch)) {
          if (lastIsSpace()) { continue; }
          fch = " ";
        }
        push(fch, i, i + w);
      }
      i += w;
    }
    return { text: out.join(""), starts: starts, ends: ends };
  }

  function normalizeNeedle(s) {
    return normalizeWithMap(s).text.replace(/^ +/, "").replace(/ +$/, "");
  }

  function allFind(hay, needle) {
    var positions = [];
    if (!needle) { return positions; }
    var pos = hay.indexOf(needle);
    while (pos !== -1) {
      positions.push(pos);
      pos = hay.indexOf(needle, pos + 1);
    }
    return positions;
  }

  // Interval flattening — mirror of build_review.segment_document.
  function segmentDocument(raw, spans) {
    var clipped = spans
      .map(function (s) {
        return { start: Math.max(0, s.start), end: Math.min(raw.length, s.end), mark: s.mark };
      })
      .filter(function (s) { return s.start < s.end; });
    var bounds = { 0: true };
    bounds[raw.length] = true;
    clipped.forEach(function (s) { bounds[s.start] = true; bounds[s.end] = true; });
    var ordered = Object.keys(bounds).map(Number).sort(function (a, b) { return a - b; });
    var segments = [];
    for (var x = 0; x < ordered.length - 1; x++) {
      var a = ordered[x], b = ordered[x + 1];
      var marks = clipped
        .filter(function (s) { return s.start <= a && b <= s.end; })
        .map(function (s) { return s.mark; });
      segments.push({ text: raw.slice(a, b), marks: marks });
    }
    return segments;
  }

  // Display-only re-anchoring: exact match first, then the normalized port.
  // The verifier's verdicts (in cites.json) stay authoritative either way.
  function findQuoteSpan(rawText, normDoc, quote) {
    var p = rawText.indexOf(quote);
    if (p !== -1) { return { start: p, end: p + quote.length }; }
    var nq = normalizeNeedle(quote);
    if (!nq) { return null; }
    var np = normDoc.text.indexOf(nq);
    if (np === -1) { return null; }
    return { start: normDoc.starts[np], end: normDoc.ends[np + nq.length - 1] };
  }

  // Locate each citation's cite_text in the memo (mirror of the verifier's
  // anchor_memo, including memo_context disambiguation for Id. chains).
  function findMemoSpans(memoText, citationList) {
    var normMemo = normalizeWithMap(memoText);
    var spans = [];
    citationList.forEach(function (c) {
      var nc = normalizeNeedle(c.cite_text);
      if (!nc) { return; }
      var positions = allFind(normMemo.text, nc);
      var pos = -1;
      if (positions.length === 1) {
        pos = positions[0];
      } else if (positions.length > 1 && c.memo_context) {
        var nctx = normalizeNeedle(c.memo_context);
        var ctxPositions = allFind(normMemo.text, nctx);
        if (ctxPositions.length === 1) {
          var inner = normMemo.text.indexOf(nc, ctxPositions[0]);
          if (inner !== -1 && inner + nc.length <= ctxPositions[0] + nctx.length) {
            pos = inner;
          }
        }
      }
      if (pos !== -1) {
        spans.push({ start: normMemo.starts[pos],
                     end: normMemo.ends[pos + nc.length - 1], mark: c.id });
      }
    });
    return spans;
  }

  // ---------------- host bridge (JSON-RPC over postMessage) ----------------
  function createBridge() {
    var pending = {}, nextId = 1, notifHandlers = {}, reqHandlers = {};
    window.addEventListener("message", function (ev) {
      // Only accept messages from the MCP Apps host (our parent window).
      // Without this, any other frame could post a spoofed JSON-RPC message
      // and trigger UI actions or tool calls. Origin is intentionally NOT
      // pinned: sandboxed MCP App iframes often carry an opaque/null origin,
      // so an origin allowlist would risk rejecting legitimate hosts.
      if (ev.source !== window.parent) { return; }
      var msg = ev.data;
      if (!msg || msg.jsonrpc !== "2.0") { return; }
      if (msg.method === undefined && msg.id !== undefined) {
        var p = pending[msg.id];
        if (p) {
          delete pending[msg.id];
          if (msg.error) { p.reject(new Error(msg.error.message || "host error")); }
          else { p.resolve(msg.result); }
        }
        return;
      }
      if (msg.method !== undefined && msg.id !== undefined) {
        var rh = reqHandlers[msg.method];
        Promise.resolve(rh ? rh(msg.params || {}) : {}).then(function (res) {
          post({ jsonrpc: "2.0", id: msg.id, result: res || {} });
        }, function (err) {
          post({ jsonrpc: "2.0", id: msg.id,
                 error: { code: -32000, message: String((err && err.message) || err) } });
        });
        return;
      }
      if (msg.method !== undefined) {
        var h = notifHandlers[msg.method];
        if (h) { h(msg.params || {}); }
      }
    });
    function post(m) { window.parent.postMessage(m, "*"); }
    return {
      request: function (method, params) {
        var id = nextId++;
        return new Promise(function (resolve, reject) {
          pending[id] = { resolve: resolve, reject: reject };
          post({ jsonrpc: "2.0", id: id, method: method, params: params || {} });
        });
      },
      notify: function (method, params) {
        post({ jsonrpc: "2.0", method: method, params: params || {} });
      },
      on: function (method, fn) { notifHandlers[method] = fn; },
      onRequest: function (method, fn) { reqHandlers[method] = fn; }
    };
  }

  // SHA-256 hex of a string, or null when crypto.subtle is unavailable (old
  // browser / non-secure host iframe) so callers can skip the check silently
  // rather than claim a mismatch they couldn't actually compute.
  function sha256Hex(text) {
    if (typeof text !== "string" ||
        !(window.crypto && crypto.subtle && crypto.subtle.digest &&
          typeof TextEncoder !== "undefined")) {
      return Promise.resolve(null);
    }
    return crypto.subtle.digest("SHA-256", new TextEncoder().encode(text))
      .then(function (buf) {
        return Array.prototype.map.call(new Uint8Array(buf), function (b) {
          return ("0" + b.toString(16)).slice(-2);
        }).join("");
      }).catch(function () { return null; });
  }

  // Compare the delivered memo_text to cites.memo.sha256 (the hash of the file
  // the verifier actually checked); banner on mismatch.
  function checkMemoIntegrity(memoText, expectedSha) {
    if (!expectedSha || typeof memoText !== "string") { return; }
    sha256Hex(memoText).then(function (hex) {
      if (hex !== null && hex !== expectedSha) {
        var banner = $("banner");
        banner.hidden = false;
        banner.textContent = "⚠ The memo text delivered to this panel does " +
          "not match the memo that was verified (SHA-256 mismatch — likely " +
          "transcription drift in the tool call). Highlights and links may " +
          "be unreliable; re-run the dingduff-citation-check skill.";
      }
    });
  }

  function showMcpStatus(text) {
    var box = $("mcp-waiting").querySelector("p:nth-of-type(2)");
    if (box) { box.textContent = text; }
  }

  // ---------------- theme (data-theme attribute on <html>) ----------------
  // The inline bootstrap in <head> set data-theme from prefers-color-scheme
  // before paint. Inside an MCP App host (Claude), prefers-color-scheme on
  // an iframe reads the OS — not Claude's in-app theme — so we also accept
  // the host's hostContext.theme (delivered in the ui/initialize result and
  // in subsequent ui/notifications/host-context-changed updates, per the
  // MCP Apps spec).
  //
  // Precedence, highest to lowest: user click on #theme-toggle > host
  // hostContext.theme > OS prefers-color-scheme. Once the user clicks, OS
  // and host changes are ignored for the rest of the session; once the
  // host sends a theme (and the user hasn't overridden), OS changes are
  // ignored.
  var userThemeOverride = false;
  var hostThemeReceived = false;

    ? window.matchMedia("(prefers-color-scheme: dark)")
    : null;

    ' stroke-width="2" stroke-linecap="round" stroke-linejoin="round"' +
    ' aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21' +
    ' 12.79z"/></svg>';
  var SUN_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"' +
    ' stroke-width="2" stroke-linecap="round" stroke-linejoin="round"' +
    ' aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2"' +
    ' x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2"' +
    ' y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line' +
    ' x1="4.2" y1="4.2" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7"' +
    ' x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/>' +
    '<line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/></svg>';

    if (theme !== "light" && theme !== "dark") { return; }
    document.documentElement.setAttribute("data-theme", theme);
    // Update the toggle icon + label to advertise the OPPOSITE action.
    // (Button may not exist yet during the inline bootstrap; harmless.)
    var btn = document.getElementById("theme-toggle");
    if (btn) {
      var goingTo = theme === "dark" ? "light" : "dark";
      btn.innerHTML = theme === "dark" ? SUN_SVG : MOON_SVG;
      btn.setAttribute("aria-label", "Switch to " + goingTo + " mode");
      btn.setAttribute("title", "Switch to " + goingTo + " mode");

  function applyHostContext(ctx) {
    // User click wins; once they pick, we stop listening to the host's theme
    // signal for the rest of the session (they can always click again).
    if (userThemeOverride) { return; }
    // McpUiHostContext.theme is optional, and partial updates (host-context-
    // changed) only carry changed fields; skip when not present.
    if (ctx && (ctx.theme === "light" || ctx.theme === "dark")) {
      hostThemeReceived = true;
      applyTheme(ctx.theme);
    }

  function toggleTheme() {
    var current = document.documentElement.getAttribute("data-theme") || "light";
    userThemeOverride = true;
    applyTheme(current === "dark" ? "light" : "dark");
